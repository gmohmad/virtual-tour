<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Photo Sphere Viewer — periodic sender (10ms)</title>

  <!-- Photo Sphere Viewer core CSS -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.14.1/index.css" />
  <style>
    body { margin:0; font-family: sans-serif; }
    #viewer { width:100vw; height:100vh; }
  </style>

  <!-- Import map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js",
      "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.14.1/index.module.js",
      "@photo-sphere-viewer/virtual-tour-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/virtual-tour-plugin@5.14.1/index.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="viewer"></div>

  <script type="module">

    import { Viewer } from '@photo-sphere-viewer/core';
    import { VirtualTourPlugin } from '@photo-sphere-viewer/virtual-tour-plugin';

    console.log("Starting viewer with periodic WebSocket (10ms)...");

    // ---------- WebSocket connection ----------
	// const ws = new WebSocket(`ws://192.168.105.102:8080/create-session?session_id=abc423&client_id=235dsd3`);
	const ws = new WebSocket(`ws://localhost:8080/create-session?session_id=abc423&client_id=235dsd3`);
    ws.onopen = () => {
      console.log('WebSocket connected');
      // Start sending current state every 10ms
      startPeriodicSend();
    };
    ws.onclose = () => {
      console.log('WebSocket disconnected');
      stopPeriodicSend();
    };
    ws.onerror = (err) => console.error('WebSocket error', err);

    // ---------- Periodic sender ----------
    let intervalId = null;
    let currentNode = { id: null, name: null };
    let currentPosition = { yaw: 0, pitch: 0 };
    let currentZoom = 0;

    function startPeriodicSend() {
      if (intervalId !== null) return;
      intervalId = setInterval(() => {
        if (ws.readyState !== WebSocket.OPEN) return;
        const msg = {
          type: 'state',  // single message type containing everything
          data: {
            nodeId: currentNode.id,
            nodeName: currentNode.name,
            yaw: currentPosition.yaw,
            pitch: currentPosition.pitch,
            zoomLevel: currentZoom
          }
        };
        ws.send(JSON.stringify(msg));
        // Optional: log only occasionally to avoid console spam
        // console.log('Sent periodic state:', msg.data);
      }, 30); // 10ms interval
    }

    function stopPeriodicSend() {
      if (intervalId !== null) {
        clearInterval(intervalId);
        intervalId = null;
      }
    }

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      stopPeriodicSend();
      if (ws.readyState === WebSocket.OPEN) ws.close();
    });
    // -------------------------------------------

    const nodes = [
      {
        id: 'zal',
        name: 'Demo A',
        panorama: './zal.jpg',
        links: [
          {
            nodeId: 'prih',
            position: { yaw: 0.5, pitch: 0.05 },
            linkOffset: { depth: 0.0, pitch: -0.05 },
            arrowStyle: {
              size: { width: 64, height: 64 },
              style: { boxShadow: '0 6px 14px rgba(0,0,0,.5)', borderRadius: '8px' }
            }
          }
        ]
      },
      {
        id: 'prih',
        name: 'Demo B',
        panorama: './prih2.jpg',
        links: [
          {
            nodeId: 'zal',
            position: { yaw: -1.8, pitch: 0.0 },
            linkOffset: { depth: 0.0, pitch: -0.05 },
            arrowStyle: {
              size: { width: 48, height: 48 },
              style: { transform: 'rotate(180deg)', opacity: 0.95 }
            }
          },
          {
            nodeId: 'kuh',
            position: { yaw: -10.8, pitch: 3.0 },
            linkOffset: { depth: 3.0, pitch: -19.05 },
            arrowStyle: {
              size: { width: 48, height: 48 },
              style: { transform: 'rotate(180deg)', opacity: 0.95 }
            }
          }
        ]
      },
      {
        id: 'kuh',
        name: 'Demo C',
        panorama: './kuh.jpg',
        links: [
          {
            nodeId: 'prih',
            position: { yaw: -1.8, pitch: 0.0 },
            linkOffset: { depth: 0.0, pitch: -0.05 },
            arrowStyle: {
              size: { width: 48, height: 48 },
              style: { transform: 'rotate(180deg)', opacity: 0.95 }
            }
          }
        ]
      }
    ];

    // Create viewer
    const viewer = new Viewer({
      container: document.getElementById('viewer'),
      panorama: nodes[0].panorama,
      caption: nodes[0].name,
      touchmoveTwoFingers: true,
      mousewheelCtrlKey: true,
      navbar: ['caption', 'zoom', 'fullscreen'],
      plugins: [
        [VirtualTourPlugin, {
          nodes: nodes,
          renderLinks: true,
          linkInFront: true
        }]
      ]
    });

    const virtualTour = viewer.getPlugin(VirtualTourPlugin);

    // Start at first node (prih as in original)
    virtualTour.setCurrentNode('prih');

    // Event listeners: only update variables, no sending
    virtualTour.addEventListener('node-changed', ({ node }) => {
      currentNode = { id: node.id, name: node.name };
    });

    viewer.addEventListener('position-updated', ({ position }) => {
      currentPosition = { yaw: position.yaw, pitch: position.pitch };
    });

    viewer.addEventListener('zoom-updated', ({ zoomLevel }) => {
      currentZoom = zoomLevel;
    });

    // Optionally send initial state immediately after ready
    viewer.addEventListener('ready', () => {
      // You could also send an immediate 'ready' message if needed,
      // but the periodic sender will include the state soon.
      console.log('Viewer ready, periodic sending active.');
    });

    viewer.addEventListener('error', (err) => {
      // Errors are rare; you could still send them immediately if desired
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'error', data: { message: err.message || String(err) } }));
      }
    });

    console.log('Viewer initialized, state will be sent every 10ms over WebSocket.');
  </script>
</body>
</html>
